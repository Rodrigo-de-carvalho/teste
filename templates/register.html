<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar Conta — Tarefas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      color: #1e293b;
    }

    .auth-card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 2rem;
      justify-content: center;
    }
    .brand-icon {
      width: 36px;
      height: 36px;
      background: #4f46e5;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      color: #fff;
      flex-shrink: 0;
    }
    .brand-name {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1e293b;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      color: #1e293b;
    }
    .subtitle {
      font-size: 0.875rem;
      color: #64748b;
      margin-bottom: 1.75rem;
    }

    .field {
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.65rem 0.875rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #1e293b;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fff;
    }
    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
    }

    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      border-radius: 8px;
      padding: 0.65rem 0.875rem;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
    }

    .btn-primary {
      width: 100%;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.7rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.5rem;
      min-height: 44px;
    }
    .btn-primary:hover { background: #4338ca; }
    .btn-primary:active { transform: scale(0.98); }

    .footer-link {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.875rem;
      color: #64748b;
    }
    .footer-link a {
      color: #4f46e5;
      font-weight: 600;
      text-decoration: none;
    }
    .footer-link a:hover { text-decoration: underline; }

    @media (max-width: 440px) {
      .auth-card { padding: 2rem 1.25rem; }
    }
  </style>
</head>
<body>

<div class="auth-card">
  <div class="brand">
    <div class="brand-icon">&#10003;</div>
    <span class="brand-name">Tarefas</span>
  </div>

  <h1>Criar Conta</h1>
  <p class="subtitle">Crie sua conta gratuitamente</p>

  {% if error %}
  <div class="error-box">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/register">
    <div class="field">
      <label for="username">Usuário</label>
      <input type="text" id="username" name="username" placeholder="seu_usuario" required autocomplete="username" />
    </div>
    <div class="field">
      <label for="password">Senha</label>
      <input type="password" id="password" name="password" placeholder="mínimo 6 caracteres" required autocomplete="new-password" />
    </div>
    <div class="field">
      <label for="confirm">Confirmar Senha</label>
      <input type="password" id="confirm" name="confirm" placeholder="repita a senha" required autocomplete="new-password" />
    </div>
    <button type="submit" class="btn-primary">Criar Conta</button>
  </form>

  <p class="footer-link">Já tem conta? <a href="/login">Entrar</a></p>
</div>

</body>
</html>
